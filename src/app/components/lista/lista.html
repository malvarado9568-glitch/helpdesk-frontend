<div class="container mt-4 mb-5">

  <div class="card shadow border-0">

    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">
        📋 Listado de Tickets
      </h4>
    </div>

    <div class="card-body">

      <div class="table-responsive">

        <table class="table table-hover table-bordered align-middle">

          <thead class="table-primary">

            <tr>
              <th>ID</th>
              <th>Título</th>
              <th>Descripción</th>
              <th>Categoría</th>
              <th>Prioridad</th>
              <th>Estado</th>
              <th width="180">Acciones</th>
            </tr>

          </thead>

          <tbody>

            <tr *ngFor="let ticket of tickets">

              <td>{{ ticket.id }}</td>

              <td>{{ ticket.titulo }}</td>

              <td>{{ ticket.descripcion }}</td>

              <td>{{ ticket.categoria }}</td>

              <td>

                <span
                  class="badge"
                  [ngClass]="{
                    'bg-danger': ticket.prioridad==='Alta',
                    'bg-warning text-dark': ticket.prioridad==='Media',
                    'bg-success': ticket.prioridad==='Baja'
                  }"
                >
                  {{ ticket.prioridad }}
                </span>

              </td>

              <td>

                <span
                  class="badge"
                  [ngClass]="{
                    'bg-success': ticket.estado==='Abierto',
                    'bg-warning text-dark': ticket.estado==='En proceso',
                    'bg-secondary': ticket.estado==='Cerrado'
                  }"
                >
                  {{ ticket.estado }}
                </span>

              </td>

              <td>

                <button
                  class="btn btn-warning btn-sm me-2"
                  (click)="editarTicket(ticket)"
                >
                  ✏️ Editar
                </button>

                <button
                  class="btn btn-danger btn-sm"
                  (click)="eliminarTicket(ticket.id)"
                >
                  🗑 Eliminar
                </button>

              </td>

            </tr>

            <tr *ngIf="tickets.length===0">

              <td colspan="7" class="text-center text-muted py-4">
                No existen tickets registrados.
              </td>

            </tr>

          </tbody>

        </table>

      </div>

      <div class="mt-3 fw-bold">
        Total de tickets:
        {{ tickets.length }}
      </div>

    </div>

  </div>

</div>
