<div class="container mt-4 mb-4">

  <div class="card shadow border-0">

    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">
        {{ modoEdicion ? '✏️ Editar Ticket' : '📝 Registrar Ticket' }}
      </h4>
    </div>

    <div class="card-body p-4">

      <form (ngSubmit)="guardarTicket()">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label for="titulo" class="form-label fw-semibold">
              Título
            </label>

            <input
              type="text"
              id="titulo"
              name="titulo"
              class="form-control"
              placeholder="Ingrese el título del ticket"
              [(ngModel)]="ticket.titulo"
              required
            >
          </div>

          <div class="col-md-6 mb-3">
            <label for="categoria" class="form-label fw-semibold">
              Categoría
            </label>

            <select
              id="categoria"
              name="categoria"
              class="form-select"
              [(ngModel)]="ticket.categoria"
              required
            >
              <option value="">Seleccione una categoría</option>
              <option value="Hardware">Hardware</option>
              <option value="Software">Software</option>
              <option value="Redes">Redes</option>
              <option value="Acceso">Acceso</option>
              <option value="Otros">Otros</option>
            </select>
          </div>

        </div>

        <div class="mb-3">
          <label for="descripcion" class="form-label fw-semibold">
            Descripción
          </label>

          <textarea
            id="descripcion"
            name="descripcion"
            class="form-control"
            rows="4"
            placeholder="Describa detalladamente el problema"
            [(ngModel)]="ticket.descripcion"
            required
          ></textarea>
        </div>

        <div class="row">

          <div class="col-md-6 mb-3">
            <label for="prioridad" class="form-label fw-semibold">
              Prioridad
            </label>

            <select
              id="prioridad"
              name="prioridad"
              class="form-select"
              [(ngModel)]="ticket.prioridad"
              required
            >
              <option value="">Seleccione una prioridad</option>
              <option value="Baja">Baja</option>
              <option value="Media">Media</option>
              <option value="Alta">Alta</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label for="estado" class="form-label fw-semibold">
              Estado
            </label>

            <select
              id="estado"
              name="estado"
              class="form-select"
              [(ngModel)]="ticket.estado"
              required
            >
              <option value="Abierto">Abierto</option>
              <option value="En proceso">En proceso</option>
              <option value="Cerrado">Cerrado</option>
            </select>
          </div>

        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">

          <button
            *ngIf="modoEdicion"
            type="button"
            class="btn btn-secondary"
            (click)="cancelarEdicion()"
          >
            Cancelar
          </button>

          <button
            type="submit"
            class="btn btn-primary px-4"
          >
            {{ modoEdicion ? 'Actualizar Ticket' : 'Guardar Ticket' }}
          </button>

        </div>

      </form>

    </div>

  </div>

</div>
