<h2>
  {{ modoEdicion ? 'Editar Ticket' : 'Registrar Ticket' }}
</h2>

<form (ngSubmit)="guardarTicket()">

  <label for="titulo">Título</label>
  <input
    type="text"
    id="titulo"
    name="titulo"
    [(ngModel)]="ticket.titulo"
  >

  <label for="descripcion">Descripción</label>
  <textarea
    id="descripcion"
    name="descripcion"
    [(ngModel)]="ticket.descripcion"
  ></textarea>

  <label for="categoria">Categoría</label>
  <select
    id="categoria"
    name="categoria"
    [(ngModel)]="ticket.categoria"
  >
    <option value="">Seleccione una categoría</option>
    <option value="Hardware">Hardware</option>
    <option value="Software">Software</option>
    <option value="Redes">Redes</option>
    <option value="Soporte">Soporte</option>
  </select>

  <label for="prioridad">Prioridad</label>
  <select
    id="prioridad"
    name="prioridad"
    [(ngModel)]="ticket.prioridad"
  >
    <option value="">Seleccione una prioridad</option>
    <option value="Baja">Baja</option>
    <option value="Media">Media</option>
    <option value="Alta">Alta</option>
  </select>

  <label for="estado">Estado</label>
  <select
    id="estado"
    name="estado"
    [(ngModel)]="ticket.estado"
  >
    <option value="Abierto">Abierto</option>
    <option value="En proceso">En proceso</option>
    <option value="Cerrado">Cerrado</option>
  </select>

  <button type="submit">
    {{ modoEdicion ? 'Actualizar Ticket' : 'Guardar Ticket' }}
  </button>

  <button
    *ngIf="modoEdicion"
    type="button"
    (click)="cancelarEdicion()"
  >
    Cancelar
  </button>

</form>

<p>{{ mensaje }}</p>
